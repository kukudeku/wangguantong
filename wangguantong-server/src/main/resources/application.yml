server:
  port: 8087

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wangguantong?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 真实支付默认关闭。开通商户后通过环境变量配置，私钥只填写文件路径，不要写进本文件。
payment:
  order-expire-minutes: ${PAYMENT_ORDER_EXPIRE_MINUTES:15}
  wechat:
    enabled: ${WECHAT_PAY_ENABLED:false}
    merchant-id: ${WECHAT_PAY_MCH_ID:}
    app-id: ${WECHAT_PAY_APP_ID:}
    merchant-serial-number: ${WECHAT_PAY_MERCHANT_SERIAL_NUMBER:}
    private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:}
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:}
    refund-notify-url: ${WECHAT_PAY_REFUND_NOTIFY_URL:}
  alipay:
    enabled: ${ALIPAY_ENABLED:false}
    app-id: ${ALIPAY_APP_ID:}
    seller-id: ${ALIPAY_SELLER_ID:}
    private-key-path: ${ALIPAY_PRIVATE_KEY_PATH:}
    public-key-path: ${ALIPAY_PUBLIC_KEY_PATH:}
    notify-url: ${ALIPAY_NOTIFY_URL:}
    return-url: ${ALIPAY_RETURN_URL:http://localhost:5173/user}
    gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipay.com/gateway.do}
