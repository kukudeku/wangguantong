# 后端 Web 服务监听端口；启动后接口地址以 http://localhost:8087 开头。
server:
  port: 8087

spring:
  # MySQL 数据源配置。部署到其他电脑时，通常只需要修改这里的地址、账号和密码。
  datasource:
    # MySQL 8 使用的 JDBC 驱动类。
    driver-class-name: com.mysql.cj.jdbc.Driver
    # wangguantong 是数据库名；serverTimezone 用于避免 Java 与 MySQL 时间出现时区偏差。
    url: jdbc:mysql://localhost:3306/wangguantong?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234

mybatis-plus:
  configuration:
    # 自动把数据库的 computer_no 映射为 Java 的 computerNo。
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键由 MySQL AUTO_INCREMENT 自动生成。
      id-type: auto
